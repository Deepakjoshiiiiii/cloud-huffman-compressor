<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Huffman Compressor</title>
    <style>
        /* General styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .upload-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }
        h3 { color: #333; margin-bottom: 10px; }
        .section-divider {
            margin: 30px 0;
            border-top: 2px dashed #eee;
        }
        input[type="file"] { margin: 15px 0; width: 100%; }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
            width: 100%;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .btn-green { background-color: #28a745; }
        .btn-green:hover { background-color: #218838; }
        .btn:hover { background-color: #0056b3; }
        #status, #decompressStatus { margin-top: 20px; color: #666; font-size: 14px; }
        
        .result-box {
            text-align: left; 
            background: #f4f4f4; 
            padding: 15px; 
            border-radius: 8px; 
            margin-top: 10px; 
            font-family: monospace;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="upload-card">
        <h3>Step 1: Huffman Compressor</h3>
        <p style="font-size: 14px; color: #666;">Convert text to compressed binary codes</p>
        
        <input type="file" id="fileInput" accept="*/*">
        <button class="btn" onclick="uploadAndCompress()">Compress File</button>
        <div id="status"></div>

        <div class="section-divider"></div>

        <h3>Step 2: Human-Readable Decompressor</h3>
        <p style="font-size: 14px; color: #666;">Restore your .huff file back to original text</p>
        
        <input type="file" id="decompressInput">
        <button class="btn btn-green" onclick="decompressFile()">Decompress Now</button>
        
        <div id="decompressStatus"></div>
    </div>

<script>
    // Global variable to store the Huffman Tree for the current session
    let huffmanRoot = null;

    async function uploadAndCompress() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');

        if (!fileInput.files[0]) {
            alert("Please select a file first!");
            return;
        }

        status.innerText = "Connecting to cloud server...";

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        try {
            const response = await fetch('/compress', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            
            // Store the root tree returned from server for decompression
            huffmanRoot = data.root; 
            
            status.innerHTML = `
                <div style="margin-top: 10px; color: green; font-weight: bold;">✅ Compression Complete!</div>
                <div class="result-box">
                    <strong>Original Size:</strong> ${data.originalSize} bytes <br>
                    <strong>Space Saved:</strong> <span style="color: blue;">${data.ratio}</span> <br>
                    <hr>
                    <strong>Binary Preview:</strong> <br>
                    <div style="font-size: 11px; color: #666; margin-bottom: 10px;">${data.preview}...</div>
                    <a href="/download?file=${data.fileName}" 
                       style="display: block; text-align: center; padding: 10px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">
                       📥 Download .huff File
                    </a>
                </div>`;
        } catch (error) {
            status.innerText = "Error: Could not connect to server.";
            console.error(error);
        }
    }

    function decompressFile() {
        const fileInput = document.getElementById('decompressInput');
        const status = document.getElementById('decompressStatus');

        if (fileInput.files.length === 0) {
            alert("Please select a compressed file first!");
            return;
        }

        if (!huffmanRoot) {
            alert("Error: No Huffman Tree found. Please compress a file in this session first!");
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const encodedString = e.target.result;
            try {
                const decodedText = decode(encodedString, huffmanRoot);
                
                // Create a Blob from the decoded text for downloading
                const blob = new Blob([decodedText], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);

                status.innerHTML = `
                    <div style="margin-top: 10px; color: green; font-weight: bold;">✅ Decoded Successfully:</div>
                    <div class="result-box" style="background: #eef9f0; color: #2d5a27;">
                        ${decodedText}
                    </div>
                    <a href="${url}" download="decompressed_result.txt" 
                       style="display: block; text-align: center; padding: 12px; background: #28a745; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 10px;">
                       📥 Download Decompressed Text
                    </a>`;
            } catch (err) {
                status.innerText = "Error during decoding. Ensure you are using the correct .huff file.";
            }
        };

        reader.readAsText(file);
    }

    // Decoding Algorithm: Traverses the tree based on 0s and 1s
    function decode(encodedString, root) {
        let result = "";
        let curr = root;
        
        for (let bit of encodedString) {
            if (bit === '0') {
                curr = curr.left;
            } else if (bit === '1') {
                curr = curr.right;
            }

            // Leaf node check
            if (!curr.left && !curr.right) {
                result += curr.char;
                curr = root; 
            }
        }
        return result;
    }
</script>
</body>
</html>
